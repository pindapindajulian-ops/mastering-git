<div class="container-fluid p-4 bg-light min-vh-100">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="fw-bold m-0">Employees</h1>

    <button
      class="btn btn-primary px-4"
      type="button"
      (click)="isFormvisible.set(true)"
    >
      Add New
    </button>
  </div>

  <!-- Employee Form -->
  @if(isFormvisible()) {

  <form class="mb-4" (ngSubmit)="saveEmployee()">

    <div class="card shadow-sm border-0 p-4">

      <!-- Form Title -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0">Add Employee</h4>
      </div>

      <div class="row">

        <!-- Left Side -->
        <div class="col-md-6">

          <!-- Employee Name -->
          <div class="mb-3">
            <label class="form-label fw-semibold">
              Employee Name
            </label>

            <input
              type="text"
              class="form-control"
              placeholder="Enter employee name"
              [(ngModel)]="employeeObj.name"
              name="name"
            />
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label class="form-label fw-semibold">
              Email
            </label>

            <input
              type="email"
              class="form-control"
              placeholder="Enter email"
              [(ngModel)]="employeeObj.email"
              name="email"
            />
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label class="form-label fw-semibold">
              Password
            </label>

            <input
              type="password"
              class="form-control"
              placeholder="Enter password"
              [(ngModel)]="employeeObj.password"
              name="password"
            />
          </div>

          <!-- Gender -->
          <div class="mb-3">
            <label class="form-label fw-semibold">
              Gender
            </label>

            <select
              class="form-select"
              [(ngModel)]="employeeObj.gender"
              name="gender"
            >
              <option value="">Select Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>

        </div>

        <!-- Right Side -->
        <div class="col-md-6">

          <!-- Contact -->
          <div class="mb-3">
            <label class="form-label fw-semibold">
              Contact No
            </label>

            <input
              type="text"
              class="form-control"
              placeholder="Enter contact number"
              [(ngModel)]="employeeObj.contactNo"
              name="contactNo"
            />
          </div>

          <!-- Department -->
          <div class="mb-3">
            <label class="form-label fw-semibold">
              Department
            </label>

            <select
              class="form-select"
              [(ngModel)]="employeeObj.department"
              name="department"
            >
              <option value="">Select Department</option>
              <option value="IT">IT</option>
              <option value="HR">HR</option>
              <option value="Finance">Finance</option>
            </select>
          </div>

          <!-- Role -->
          <div class="mb-3">
            <label class="form-label fw-semibold">
              Role
            </label>

            <input
              type="text"
              class="form-control"
              placeholder="Enter role"
              [(ngModel)]="employeeObj.role"
              name="role"
            />
          </div>

        </div>

      </div>

      <!-- Buttons -->
      <div class="mt-3 d-flex gap-2">

        <button
          type="submit"
          class="btn btn-success px-4"
        >
          Submit
        </button>

        <button
          type="button"
          class="btn btn-secondary"
          (click)="isFormvisible.set(false)"
        >
          Close
        </button>

      </div>

    </div>

  </form>

  }

  <!-- Employee List -->
  <div class="card shadow-sm border-0 mt-5 p-4">

    <h1 class="fw-bold mb-4">
      Employee List
    </h1>

    <div class="table-responsive">

      <table class="table table-bordered table-hover align-middle">

        <thead class="table-light">

          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Contact</th>
            <th>Email</th>
            <th>Department</th>
            <th>Role</th>
            <th>Gender</th>
            <th>Actions</th>
          </tr>

        </thead>

        <tbody>

        @for(emp of employeeList$ | async; track emp.id) {

          <tr>

            <td>{{ emp.id }}</td>
            <td>{{ emp.name }}</td>
            <td>{{ emp.contactNo }}</td>
            <td>{{ emp.email }}</td>
            <td>{{ emp.department }}</td>
            <td>{{ emp.role }}</td>
            <td>{{ emp.gender }}</td>

            <td>

              <button class="btn btn-warning btn-sm me-2">
                Edit
              </button>

              <button
                class="btn btn-danger btn-sm"
                (click)="deleteEmployee(emp.id)"
              >
                Delete
              </button>

            </td>

          </tr>

          }

        </tbody>

      </table>

    </div>

  </div>

</div>
